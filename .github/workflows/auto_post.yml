name: Blogger AI Bot
on:
  schedule:
    - cron: '0 */6 * * *' # සෑම පැය 6කට වරක් ක්‍රියාත්මක වේ
  workflow_dispatch: # Manual run කිරීමට
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run bot
        run: python main.py
        env:
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
