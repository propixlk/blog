name: Blogger AI Bot

on:
  schedule:
    - cron: '0 */6 * * *' # සෑම පැය 6කට වරක් ස්වයංක්‍රීයව ක්‍රියාත්මක වේ
  workflow_dispatch:      # ඔබට අවශ්‍ය ඕනෑම වෙලාවක manual run කිරීමට බොත්තම ලබා දෙයි

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # පද්ධතියේ ස්ථායීතාවය සඳහා Python 3.10 භාවිතා කරයි

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          # GitHub Secrets වලින් දත්ත ලබා ගැනීම
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }} 
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
